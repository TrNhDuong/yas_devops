# Setting Spring context path & port
server.servlet.context-path=/sampledata
server.port=8094

# H2 in-memory datasource for tests
spring.datasource.product.url=jdbc:h2:mem:testproductdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.media.url=jdbc:h2:mem:testmediadb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

spring.sql.init.mode=never
spring.liquibase.enabled=false

# Security
spring.profiles.active=test
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

# Springdoc
springdoc.oauthflow.authorization-url=http://localhost:9000/auth
springdoc.oauthflow.token-url=http://localhost:9000/token

cors.allowed-origins=*