name: sampledata service ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'sampledata/**'
              - '.github/workflows/sampledata-ci.yaml'
              - 'pom.xml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Unit Tests & Generate JaCoCo Report
        run: mvn clean verify -pl sampledata -am -B

      - name: Quality Gate (Console)
        run: |
          awk -F"," 'NR>1 { missed += $4; covered += $5 } END {
            if (missed+covered > 0) {
              pct = covered/(missed+covered)*100
              printf "CURRENT COVERAGE: %.2f%%\n", pct
              if (pct < 70) { print "FAIL: Coverage below 70%"; exit 1 }
              else { print "PASS: Coverage meets threshold" }
            } else { print "ERROR: No coverage data found"; exit 1 }
          }' sampledata/target/site/jacoco/jacoco.csv

      - name: Add Coverage Report to PR
        uses: Madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: sampledata/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          title: '## 🔬 sampledata - Coverage Report'

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sampledata-test-coverage-reports
          path: |
            sampledata/target/surefire-reports/*.xml
            sampledata/target/site/jacoco/

  build:
    needs: test
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        run: mvn clean package -pl sampledata -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./sampledata
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-sampledata:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-sampledata:latest
