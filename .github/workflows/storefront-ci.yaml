name: storefront service ci

on:
  push:
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yaml"
  pull_request:
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch:

jobs:
  # ==========================================
  # PHASE 0: CHECK CHANGES
  # ==========================================
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      storefront: ${{ steps.filter.outputs.storefront }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            storefront:
              - "storefront/**"

  # ==========================================
  # PHASE 1: TEST & REPORT
  # ==========================================
  test:
    needs: check-changes
    if: needs.check-changes.outputs.storefront == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci
        working-directory: storefront

      - name: Build
        run: npm run build
        working-directory: storefront

      - name: Lint
        run: npm run lint
        working-directory: storefront

      - name: Format Check
        run: npx prettier --check .
        working-directory: storefront

      - name: Security Audit
        run: npm audit --omit=dev
        continue-on-error: true
        working-directory: storefront

  # ==========================================
  # PHASE 2: BUILD & PUSH IMAGE
  # ==========================================
  build:
    needs: [check-changes, test]
    if: needs.check-changes.outputs.storefront == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-storefront:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-storefront:latest