name: storefront service ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'storefront/**'
              - '.github/workflows/storefront-ci.yaml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: storefront

      - name: Build
        run: npm run build
        working-directory: storefront

      - name: Lint
        run: npm run lint
        working-directory: storefront

      - name: Format Check
        run: npx prettier --check .
        working-directory: storefront

      - name: Security Audit
        run: npm audit --omit=dev
        continue-on-error: true
        working-directory: storefront

      - name: Run Unit Tests & Generate Coverage Report
        run: npm run test:coverage -- --ci
        working-directory: storefront

      - name: Code Coverage Quality Gate (Console)
        run: |
          SUMMARY="storefront/coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const s = require('./$SUMMARY').total;
              const overall = Math.min(s.lines.pct, s.functions.pct, s.branches.pct, s.statements.pct);
              const pct = parseFloat(overall).toFixed(2);
              process.stdout.write('===========================================\n');
              process.stdout.write(' STOREFRONT SERVICE COVERAGE: ' + pct + '%\n');
              process.stdout.write('===========================================\n');
              if (overall < 70) {
                process.stdout.write(' FAILED: Coverage below minimum 70%\n');
                process.exit(1);
              }
            "
          else
            echo "::error::coverage-summary.json not found. Check Jest configuration!"
            exit 1
          fi

      - name: Add Coverage Report to PR
        if: github.event_name == 'pull_request'
        uses: AthleticNet/comment-test-coverage@1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: storefront/coverage/coverage-summary.json
          title: Storefront Service Coverage Report

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storefront-coverage-report
          path: storefront/coverage/

  security:
    needs:
      - detect-changes
      - test
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Test & Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          name: storefront-coverage-report
          path: storefront/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backoffice
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=trnhduong
            -Dsonar.projectKey=TrNhDuong_yas_devops 
            -Dsonar.sources=common,constants,modules,pages,utils
            -Dsonar.tests=__tests__
            -Dsonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=coverage/**,node_modules/**,public/**,.next/**

  build:
    needs: test
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-storefront:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-storefront:latest
