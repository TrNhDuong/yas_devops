name: Gitleaks Security Scanon 
on: 
  push:    
    branches: [ "**" ]  
  pull_request:   
    branches: [ "**" ]  
  schedule:    
    - cron: "0 0 * * *"  
  workflow_dispatch:
  

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Official Action
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.ENABLE_SNYK_SCAN == true }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk scan for entire project
        run: |
          snyk test \
            --file=pom.xml \
            --project-name=yas-monorepo \
            --severity-threshold=${{ inputs.SNYK_SEVERITY || 'high' }} \
            --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk report
        if: always()
        run: |
          snyk test \
            --file=pom.xml \
            --project-name=yas-monorepo \
            --severity-threshold=${{ inputs.SNYK_SEVERITY || 'high' }} \
            --all-projects \
            --json > snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30