name: customer service ci

on:
  push:
    # Requirement 4 & 6: Chay tren moi nhanh khi code trong folder service thay doi
    paths:
      - "customer/**"
      - ".github/workflows/customer-ci.yaml"
      - "pom.xml"
  pull_request:
    paths:
      - "customer/**"
      - ".github/workflows/customer-ci.yaml"
  workflow_dispatch:

jobs:
  # ==========================================
  # PHASE 1: TEST & REPORT (Moi nhanh)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Unit Tests & Generate JaCoCo Report
        # Requirement 5: Chay test va do do phu
        run: mvn clean verify -pl customer -am

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        # Quan trong: Luon upload de co minh chung nop do an ke ca khi test fail
        if: always()
        with:
          name: customer-test-coverage-reports
          path: |
            customer/target/surefire-reports/*.xml
            customer/target/site/jacoco/

  # ==========================================
  # PHASE 2: BUILD & PUSH IMAGE
  # ==========================================
  build:
    # Logic: Neu Test fail thi KHONG chay buoc nay
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        # Vi da test o Phase 1 nen o day skip cho nhanh
        run: mvn clean package -pl customer -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-customer:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-customer:latest