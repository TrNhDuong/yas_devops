name: location service ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'location/**'
              - '.github/workflows/location-ci.yaml'
              - 'pom.xml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Unit Tests & Generate JaCoCo Report
        run: mvn clean verify -pl location -am

      - name: Code Coverage Quality Gate (Console)
        run: |
          REPORT_CSV="location/target/site/jacoco/jacoco.csv"
          if [ -f "$REPORT_CSV" ]; then
            awk -F"," 'NR>1 { missed += $4; covered += $5 } END {
              if (missed+covered > 0) coverage = (covered/(missed+covered))*100
              else coverage = 0
              printf "===========================================\n"
              printf " LOCATION SERVICE COVERAGE: %.2f%%\n", coverage
              printf "===========================================\n"
              if (coverage < 70) {
                printf " FAILED: Coverage thấp hơn mức tối thiểu 70%%\n"
                exit 1
              }
            }' $REPORT_CSV
          else
            echo "::error::Không tìm thấy file jacoco.csv. Kiểm tra cấu hình jacoco-maven-plugin!"
            exit 1
          fi

      - name: Add Coverage Report to PR
        uses: Madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: location/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          title: 'Báo cáo độ phủ - Location Service'
          update-comment: true

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: location-test-coverage-reports
          path: |
            location/target/surefire-reports/*.xml
            location/target/site/jacoco/

  build:
    needs: test
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        run: mvn clean package -pl location -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./location
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-location:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-location:latest
