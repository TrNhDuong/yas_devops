name: storefront-bff service ci

on:
  push:
    paths:
      - "storefront-bff/**"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"
  pull_request:
    paths:
      - "storefront-bff/**"
      - ".github/workflows/storefront-bff-ci.yaml"
  workflow_dispatch:

jobs:
  # ==========================================
  # PHASE 0: CHECK CHANGES
  # ==========================================
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      storefront-bff: ${{ steps.filter.outputs.storefront-bff }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            storefront-bff:
              - "storefront-bff/**"

  # ==========================================
  # PHASE 1: TEST & REPORT
  # ==========================================
  test:
    needs: check-changes
    if: needs.check-changes.outputs.storefront-bff == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Unit Tests & Generate JaCoCo Report
        run: mvn clean verify -pl storefront-bff -am

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storefront-bff-test-coverage-reports
          path: |
            storefront-bff/target/surefire-reports/*.xml
            storefront-bff/target/site/jacoco/

  # ==========================================
  # PHASE 2: BUILD & PUSH IMAGE
  # ==========================================
  build:
    needs: [check-changes, test]
    if: needs.check-changes.outputs.storefront-bff == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        run: mvn clean package -pl storefront-bff -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront-bff
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-storefront-bff:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-storefront-bff:latest