name: payment service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Maven verify (Tests + JaCoCo)
        run: mvn clean verify -pl payment -am -B

      - name: Quality Gate - Check Coverage >= 70%
        run: |
          awk -F"," 'NR>1 { missed += $4; covered += $5 } END { if (missed+covered > 0) { pct = covered/(missed+covered)*100; printf "CURRENT COVERAGE: %.2f%%\n", pct; if (pct < 70) { print "COVERAGE BELOW 70% - FAILING BUILD"; exit 1 } else { print "Coverage OK" } } else { print "ERROR: No coverage data found"; exit 1 } }' payment/target/site/jacoco/jacoco.csv

      - name: Add Coverage Report to PR
        uses: Madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/payment/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Payment Service - JaCoCo Coverage Report"
          update-comment: true

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: payment-test-coverage-reports
          path: |
            payment/target/surefire-reports/*.xml
            payment/target/site/jacoco/

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        run: mvn clean package -pl payment -am -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./payment
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-payment:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-payment:latest
