name: tax service ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'tax/**'
              - '.github/workflows/tax-ci.yaml'
              - 'pom.xml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Run Unit Tests & Generate JaCoCo Report
        run: mvn clean verify -pl tax -am

      - name: Code Coverage Quality Gate (Console)
        run: |
          REPORT_CSV="tax/target/site/jacoco/jacoco.csv"
          if [ -f "$REPORT_CSV" ]; then
            awk -F"," 'NR>1 { missed += $4; covered += $5 } END {
              if (missed+covered > 0) coverage = (covered/(missed+covered))*100
              else coverage = 0
              printf "===========================================\n"
              printf " TAX SERVICE COVERAGE: %.2f%%\n", coverage
              printf "===========================================\n"
              if (coverage < 70) {
                printf " FAILED: Coverage thấp hơn mức tối thiểu 70%%\n"
                exit 1
              }
            }' $REPORT_CSV
          else
            echo "::error::Không tìm thấy file jacoco.csv. Kiểm tra cấu hình jacoco-maven-plugin!"
            exit 1
          fi

      - name: Add Coverage Report to PR
        uses: Madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: tax/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          title: 'Báo cáo độ phủ - Tax Service'
          update-comment: true

      - name: Upload Test & Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tax-test-coverage-reports
          path: |
            tax/target/surefire-reports/*.xml
            tax/target/site/jacoco/

  # ------------------------------------------------------------------ #
  # Job Security: SonarCloud                                            #
  # ------------------------------------------------------------------ #
  security:
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Download Test & Coverage Artifacts (from job test)
        uses: actions/download-artifact@v4
        with:
          name: tax-test-coverage-reports
          path: tax/target/site/jacoco/

      - name: Compile & SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean compile sonar:sonar \
            -pl tax -am \
            -DskipTests -DskipITs \
            -Dsonar.projectKey=TrNhDuong_yas_devops \
            -Dsonar.organization=trnhduong \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -B --no-transfer-progress

  build:
    needs: [detect-changes, security]
    if: needs.detect-changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven
        uses: ./.github/workflows/actions

      - name: Build Package (Skip Tests)
        run: mvn clean package -pl tax -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./tax
          load: true
          push: false
          tags: ghcr.io/${{ env.OWNER_LC }}/yas-tax:latest

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/yas-tax:latest
